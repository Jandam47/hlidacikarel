// Pokud SW je registrovaný ale ještě nepřevzal kontrolu → force reload
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.ready.then(reg => {
    if (!window.crossOriginIsolated) {
      console.log('[COI] SW ready ale crossOriginIsolated=false, reloaduji...');
      window.location.reload();
    }
  });
}
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;font-family:'Rajdhani',sans-serif}
body{background:#0a0014;color:#0ff;min-height:100vh;display:flex;align-items:center;justify-content:center;
background-image:linear-gradient(rgba(255,0,170,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,255,.05) 1px,transparent 1px);
background-size:30px 30px}
.box{width:480px;background:#10031f;border:2px solid #ff00aa;border-radius:10px;padding:30px;
box-shadow:0 0 25px #ff00aa,0 0 60px rgba(0,255,255,.2) inset}
h1{font-family:'Orbitron',sans-serif;font-size:24px;text-align:center;color:#0ff;
text-shadow:0 0 10px #0ff,0 0 20px #ff00aa;margin-bottom:5px;letter-spacing:2px}
.sub{text-align:center;color:#ff00aa;font-size:12px;letter-spacing:3px;margin-bottom:25px}
.isolation{text-align:center;font-size:11px;margin-bottom:15px;padding:6px;border-radius:4px}
.isolated{color:#0f0;border:1px solid #0f0;background:rgba(0,255,0,.05)}
.not-isolated{color:#ff0;border:1px solid #ff0;background:rgba(255,255,0,.05)}
.drop{border:2px dashed #0ff;border-radius:8px;padding:40px 20px;text-align:center;cursor:pointer;
transition:.3s;margin-bottom:20px}
.drop:hover,.drop.drag{background:rgba(0,255,255,.08);box-shadow:0 0 20px #0ff inset}
.drop p{color:#0ff;font-size:14px}
input[type=file]{display:none}
#fname{color:#ff00aa;font-size:13px;margin-top:10px;word-break:break-all}
button{width:100%;padding:14px;background:linear-gradient(90deg,#ff00aa,#0ff);border:none;
border-radius:8px;color:#10031f;font-family:'Orbitron',sans-serif;font-weight:700;font-size:16px;
cursor:pointer;letter-spacing:2px;transition:.2s}
button:disabled{opacity:.3;cursor:not-allowed}
button:hover:not(:disabled){transform:scale(1.02);box-shadow:0 0 20px #0ff}
#status{text-align:center;margin-top:15px;font-size:13px;color:#0ff;min-height:40px;word-break:break-all}
#progress{width:100%;height:8px;background:#1a0030;border-radius:4px;overflow:hidden;margin-top:10px;display:none}
#bar{height:100%;width:0%;background:linear-gradient(90deg,#ff00aa,#0ff);transition:width .2s}
#dl{display:none;text-align:center;margin-top:15px;color:#0ff;font-weight:700;text-decoration:none;
border:1px solid #0ff;padding:10px;border-radius:6px}
#dl:hover{background:rgba(0,255,255,.1)}
</style>
</head>
<body>
<div class="box">
  <h1>VIDEO // AUDIO EXTRACTOR</h1>
  <div class="sub">MP4 ➜ MP3 :: LOCAL ONLY :: NO UPLOAD</div>
  <div class="isolation" id="isoStatus"></div>

  <div class="drop" id="drop">
    <p>📁 Klikni nebo přetáhni MP4 sem</p>
    <div id="fname"></div>
  </div>
  <input type="file" id="file" accept="video/mp4,video/*">

  <button id="go" disabled>KONVERTOVAT</button>
  <div id="progress"><div id="bar"></div></div>
  <div id="status"></div>
  <a id="dl">⬇ STÁHNOUT MP3</a>
</div>

<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
<script>
// Debug info – zobrazí stav izolace
const isoEl = document.getElementById('isoStatus');
const isolated = window.crossOriginIsolated;
isoEl.textContent = isolated
  ? '✅ crossOriginIsolated = true — ffmpeg připraven'
  : '⚠ crossOriginIsolated = false — čekám na Service Worker...';
isoEl.className = 'isolation ' + (isolated ? 'isolated' : 'not-isolated');

const drop=document.getElementById('drop'), fileInput=document.getElementById('file');
const go=document.getElementById('go'), status=document.getElementById('status');
const bar=document.getElementById('bar'), prog=document.getElementById('progress'), dl=document.getElementById('dl');
let file=null;

drop.onclick=()=>fileInput.click();
drop.ondragover=e=>{e.preventDefault();drop.classList.add('drag')};
drop.ondragleave=()=>drop.classList.remove('drag');
drop.ondrop=e=>{e.preventDefault();drop.classList.remove('drag');setFile(e.dataTransfer.files[0])};
fileInput.onchange=e=>setFile(e.target.files[0]);

function setFile(f){
  if(!f) return;
  file=f;
  document.getElementById('fname').textContent=f.name;
  go.disabled=false;
  dl.style.display='none';
  status.textContent='';
}

const { createFFmpeg, fetchFile } = FFmpeg;
const ffmpeg = createFFmpeg({
  log: true,
  corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
  progress: ({ ratio }) => {
    if (ratio >= 0 && ratio <= 1) bar.style.width = (ratio*100)+'%';
  }
});

go.onclick=async()=>{
  go.disabled=true;
  prog.style.display='block';
  bar.style.width='0%';
  status.style.color='#0ff';

  try{
    status.textContent='⚙ Načítám FFmpeg jádro (může trvat 10–30s)...';
    if(!ffmpeg.isLoaded()) await ffmpeg.load();

    status.textContent='🎧 Konvertuji...';
    ffmpeg.FS('writeFile','input.mp4', await fetchFile(file));
    await ffmpeg.run('-i','input.mp4','-vn','-b:a','192k','output.mp3');

    const data = ffmpeg.FS('readFile','output.mp3');
    const blob = new Blob([data.buffer],{type:'audio/mp3'});
    const url = URL.createObjectURL(blob);

    dl.href=url;
    dl.download=file.name.replace(/\.[^.]+$/,'')+'.mp3';
    dl.style.display='block';
    dl.textContent='⬇ STÁHNOUT: '+dl.download;
    status.textContent='✅ Hotovo!';

  }catch(err){
    status.style.color='#ff00aa';
    status.textContent='❌ '+err.message;
    console.error(err);
  }

  go.disabled=false;
};
</script>
</body>
</html>
